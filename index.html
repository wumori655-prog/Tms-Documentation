<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>操盘系统 · 产品文档</title>
  <meta name="description" content="操盘系统产品文档">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --theme-color: #2563eb;
      --theme-color-light: #eff6ff;
      --border-color: #e5e7eb;
      --text-color: #1f2937;
      --text-light: #6b7280;
      --bg-color: #fafbfc;
      --sidebar-bg: #ffffff;
      --header-h: 56px;
      --sidebar-w: 300px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Roboto, sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
    }

    /* 顶部 Header */
    .app-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--header-h);
      background: #fff;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      padding: 0 24px;
      z-index: 1000;
      box-shadow: 0 1px 2px rgba(0,0,0,.04);
    }
    .app-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: calc(var(--sidebar-w) - 24px);
      text-decoration: none;
      color: var(--text-color);
    }
    .app-logo-mark {
      width: 32px; height: 32px;
      background: var(--theme-color);
      color: #fff;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
    }
    .app-logo-text { display: flex; flex-direction: column; line-height: 1.2; }
    .app-logo-text .t1 { font-size: 14px; font-weight: 600; }
    .app-logo-text .t2 { font-size: 11px; color: var(--text-light); }
    .app-breadcrumb {
      flex: 1;
      font-size: 13px;
      color: var(--text-light);
      padding-left: 16px;
    }
    .app-breadcrumb .sep { color: #d1d5db; margin: 0 8px; }
    .app-breadcrumb .current { color: var(--text-color); font-weight: 500; }

    /* 顶部搜索框 */
    .app-search { position: relative; width: 360px; }
    .app-search input {
      width: 100%;
      padding: 8px 36px 8px 36px;
      font-size: 13px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      background: var(--bg-color);
      outline: none;
      transition: all .15s;
      box-sizing: border-box;
    }
    .app-search input:focus {
      border-color: var(--theme-color);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(37,99,235,.1);
    }
    .app-search .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-light);
      font-size: 16px;
      pointer-events: none;
    }
    .app-search .clear-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-light);
      cursor: pointer;
      font-size: 16px;
      display: none;
      padding: 2px 6px;
    }
    .app-search.has-text .clear-btn { display: block; }
    .app-search .shortcut-hint {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-light);
      font-size: 11px;
      padding: 2px 6px;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      background: #fff;
      pointer-events: none;
    }
    .app-search.has-text .shortcut-hint { display: none; }
    .app-search .results {
      position: absolute;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: #fff;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      max-height: 70vh;
      overflow-y: auto;
      box-shadow: 0 8px 24px rgba(0,0,0,.12);
      display: none;
      z-index: 1100;
    }
    .app-search.active .results { display: block; }
    .app-search .result-section {
      padding: 6px 0;
      border-bottom: 1px solid var(--border-color);
    }
    .app-search .result-section:last-child { border-bottom: none; }
    .app-search .result-section-title {
      padding: 8px 14px 4px;
      font-size: 10px;
      font-weight: 600;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .app-search .result-item {
      padding: 10px 14px;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: background .1s;
    }
    .app-search .result-item:hover,
    .app-search .result-item.active {
      background: var(--theme-color-light);
      border-left-color: var(--theme-color);
    }
    .app-search .result-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-color);
      margin-bottom: 2px;
    }
    .app-search .result-path {
      font-size: 11px;
      color: var(--text-light);
      margin-bottom: 4px;
    }
    .app-search .result-snippet {
      font-size: 12px;
      color: var(--text-light);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .app-search mark {
      background: #fef3c7;
      color: inherit;
      padding: 0 2px;
      border-radius: 2px;
      font-weight: 600;
    }
    .app-search .no-results {
      padding: 24px;
      text-align: center;
      color: var(--text-light);
      font-size: 13px;
    }
    .app-search .result-footer {
      padding: 8px 14px;
      font-size: 11px;
      color: var(--text-light);
      background: var(--bg-color);
      border-top: 1px solid var(--border-color);
      text-align: center;
    }

    /* Docsify 主体调整 */
    body .sidebar {
      top: var(--header-h);
      width: var(--sidebar-w);
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border-color);
      padding: 16px 0;
    }
    body .sidebar > h1 { display: none; }
    body .content {
      top: var(--header-h);
      left: var(--sidebar-w);
      padding-top: 16px;
    }
    body .markdown-section {
      max-width: 880px;
      padding: 32px 48px;
      background: #fff;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      margin: 16px auto;
    }
    .sidebar ul { list-style: none; padding: 0; margin: 0; }
    .sidebar ul li { margin: 1px 0; }
    .sidebar ul li a {
      display: block;
      padding: 7px 16px 7px 24px;
      font-size: 13px;
      color: var(--text-color);
      text-decoration: none;
      border-radius: 5px;
      margin: 1px 8px;
      transition: background .1s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sidebar ul li a:hover { background: #f3f4f6; text-decoration: none; }
    .sidebar ul li.active > a,
    .sidebar ul li > a.active {
      background: var(--theme-color-light);
      color: var(--theme-color);
      font-weight: 500;
      border-right: none;
    }
    .sidebar ul li > p {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: .5px;
      padding: 10px 20px 6px;
      margin: 8px 0 0;
    }
    .sidebar .search { display: none !important; }

    /* 内容区文字样式 */
    .markdown-section h1 {
      font-size: 26px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-color);
      margin-top: 0;
    }
    .markdown-section h2 { font-size: 21px; margin-top: 32px; }
    .markdown-section h3 { font-size: 17px; margin-top: 24px; }
    .markdown-section h4 { font-size: 15px; margin-top: 20px; }
    .markdown-section p, .markdown-section li {
      font-size: 14.5px;
      line-height: 1.75;
      color: var(--text-color);
    }
    .markdown-section code {
      background: #f3f4f6;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 0.88em;
      color: #d63384;
    }
    .markdown-section pre { background: #f8f9fa; border-radius: 6px; }
    .markdown-section pre > code { background: transparent; color: var(--text-color); }
    .markdown-section table { display: table; width: 100%; font-size: 13.5px; }
    .markdown-section table th { background: #f9fafb; font-weight: 600; }
    .markdown-section blockquote {
      border-left: 3px solid var(--theme-color);
      background: var(--theme-color-light);
      color: var(--text-color);
      padding: 12px 16px;
      border-radius: 0 6px 6px 0;
    }

    .docsify-pagination-container { display: none; }
    nav.app-nav { display: none; }
    section.cover { display: none; }

    @media (max-width: 768px) {
      .app-search { width: 200px; }
      .app-breadcrumb { display: none; }
      .app-logo { min-width: auto; }
      body .content { left: 0; padding-top: var(--header-h); }
      body .markdown-section { padding: 20px; margin: 12px; }
    }
  </style>
</head>
<body>

<div class="app-header">
  <a href="#/" class="app-logo">
    <div class="app-logo-mark">OP</div>
    <div class="app-logo-text">
      <div class="t1">操盘系统</div>
      <div class="t2">Product Documentation</div>
    </div>
  </a>
  <div class="app-breadcrumb" id="appBreadcrumb">
    <span>选择左侧章节开始阅读</span>
  </div>
  <div class="app-search" id="appSearch">
    <span class="search-icon">⌕</span>
    <input type="text" id="searchInput" placeholder="搜索文档关键词…" autocomplete="off" spellcheck="false">
    <span class="shortcut-hint">/</span>
    <button class="clear-btn" id="clearBtn" type="button">×</button>
    <div class="results" id="searchResults"></div>
  </div>
</div>

<div id="app">加载中…</div>

<script>
window.$docsify = {
  name: '',
  loadSidebar: true,
  subMaxLevel: 0,
  maxLevel: 4,
  auto2top: true,
  homepage: 'README.md',
  notFoundPage: false,
  alias: { '/.*/_sidebar.md': '/_sidebar.md' },
  sidebarDisplayLevel: 1,
  plugins: [
    function(hook, vm) {
      hook.doneEach(function() {
        const bc = document.getElementById('appBreadcrumb');
        if (!bc) return;
        const path = vm.route.path || '';
        const parts = path.split('/').filter(p => p);
        if (parts.length === 0) {
          bc.innerHTML = '<span>选择左侧章节开始阅读</span>';
        } else if (parts.length === 1) {
          bc.innerHTML = '<span>' + decodeURIComponent(parts[0]) + '</span>';
        } else {
          const mod = decodeURIComponent(parts[0]);
          const file = decodeURIComponent(parts[parts.length - 1]).replace('.md', '');
          bc.innerHTML = '<span>' + mod + '</span><span class="sep">/</span><span class="current">' + file + '</span>';
        }
      });
    }
  ]
};
</script>

<script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>

<script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
  mermaid.initialize({ startOnLoad: false, theme: 'default' });
  document.addEventListener('DOMContentLoaded', () => {
    const observer = new MutationObserver(() => {
      const blocks = document.querySelectorAll('.mermaid:not([data-processed])');
      if (blocks.length) {
        blocks.forEach((el, i) => {
          el.id = 'mermaid-' + Date.now() + '-' + i;
          el.setAttribute('data-processed', 'true');
        });
        try { mermaid.run({ nodes: blocks }); } catch(e) {}
      }
    });
    observer.observe(document.body, { childList: true, subtree: true });
  });
</script>

<script>
// 自定义搜索引擎（不依赖 Docsify search plugin）
(function() {
  const input = document.getElementById('searchInput');
  const results = document.getElementById('searchResults');
  const wrap = document.getElementById('appSearch');
  const clearBtn = document.getElementById('clearBtn');

  let docIndex = [];
  let loaded = false;
  let loading = false;
  let activeIdx = -1;

  async function buildIndex() {
    if (loaded || loading) return;
    loading = true;
    results.innerHTML = '<div class="no-results">正在加载文档索引…</div>';
    wrap.classList.add('active');

    try {
      const sidebarRes = await fetch('_sidebar.md');
      const sidebarText = await sidebarRes.text();
      const linkRegex = /\[([^\]]+)\]\(([^)]+\.md)\)/g;
      const links = [];
      let m;
      while ((m = linkRegex.exec(sidebarText)) !== null) {
        const title = m[1];
        const path = m[2];
        const parts = path.split('/');
        const module = parts.length > 1 ? parts[0] : '';
        const file = parts[parts.length - 1].replace('.md', '');
        links.push({ title, path, module, file });
      }

      const BATCH = 10;
      for (let i = 0; i < links.length; i += BATCH) {
        const batch = links.slice(i, i + BATCH);
        const contents = await Promise.all(
          batch.map(async (l) => {
            try {
              const r = await fetch(l.path);
              return await r.text();
            } catch (e) { return ''; }
          })
        );
        contents.forEach((content, j) => {
          docIndex.push({
            title: batch[j].title,
            path: batch[j].path,
            module: batch[j].module,
            file: batch[j].file,
            content: content,
            contentLower: content.toLowerCase(),
            titleLower: batch[j].title.toLowerCase(),
            moduleLower: batch[j].module.toLowerCase()
          });
        });
      }

      loaded = true;
      loading = false;
      if (input.value) search(input.value);
      else { wrap.classList.remove('active'); }
    } catch (e) {
      loading = false;
      results.innerHTML = '<div class="no-results">索引加载失败：' + e.message + '</div>';
    }
  }

  function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
  }

  function highlight(text, keywords) {
    let result = escapeHtml(text);
    keywords.forEach(kw => {
      if (!kw) return;
      const re = new RegExp('(' + escapeRegex(escapeHtml(kw)) + ')', 'gi');
      result = result.replace(re, '<mark>$1</mark>');
    });
    return result;
  }

  function findFirstHit(text, keywords) {
    let minIdx = -1;
    for (const kw of keywords) {
      const idx = text.indexOf(kw);
      if (idx >= 0 && (minIdx === -1 || idx < minIdx)) minIdx = idx;
    }
    return minIdx;
  }

  function extractSnippet(content, keywords, maxLen) {
    maxLen = maxLen || 120;
    const lower = content.toLowerCase();
    const idx = findFirstHit(lower, keywords);
    if (idx < 0) return content.substring(0, maxLen);
    const start = Math.max(0, idx - 30);
    const end = Math.min(content.length, idx + maxLen);
    let snippet = content.substring(start, end);
    snippet = snippet.replace(/[#*`>\[\]()]/g, '').replace(/\s+/g, ' ').trim();
    return (start > 0 ? '…' : '') + snippet + (end < content.length ? '…' : '');
  }

  function score(doc, keywords, queryLower) {
    let s = 0;
    if (doc.titleLower.includes(queryLower)) s += 100;
    if (doc.moduleLower.includes(queryLower)) s += 30;
    keywords.forEach(kw => {
      if (doc.titleLower.includes(kw)) s += 20;
      if (doc.moduleLower.includes(kw)) s += 10;
    });
    keywords.forEach(kw => {
      const count = (doc.contentLower.match(new RegExp(escapeRegex(kw), 'g')) || []).length;
      s += Math.min(count, 5) * 2;
    });
    return s;
  }

  function search(query) {
    const q = query.trim();
    if (!q) { results.innerHTML = ''; wrap.classList.remove('active'); return; }
    if (!loaded) { buildIndex(); return; }

    const queryLower = q.toLowerCase();
    const keywords = queryLower.split(/\s+/).filter(k => k.length > 0);
    if (!keywords.length) return;

    const matched = docIndex
      .filter(doc => {
        const combined = doc.titleLower + ' ' + doc.moduleLower + ' ' + doc.contentLower;
        return keywords.every(kw => combined.includes(kw));
      })
      .map(doc => Object.assign({}, doc, { _score: score(doc, keywords, queryLower) }))
      .sort((a, b) => b._score - a._score)
      .slice(0, 30);

    if (!matched.length) {
      results.innerHTML = '<div class="no-results">没有匹配的结果</div>';
      wrap.classList.add('active');
      return;
    }

    const grouped = {};
    matched.forEach(d => {
      const key = d.module || '其他';
      if (!grouped[key]) grouped[key] = [];
      grouped[key].push(d);
    });

    let html = '';
    for (const mod in grouped) {
      const docs = grouped[mod];
      html += '<div class="result-section">';
      html += '<div class="result-section-title">' + escapeHtml(mod) + ' · ' + docs.length + ' 个结果</div>';
      docs.forEach(d => {
        const snippet = extractSnippet(d.content, keywords);
        html += '<div class="result-item" data-path="' + escapeHtml(d.path) + '">';
        html += '<div class="result-title">' + highlight(d.title, keywords) + '</div>';
        html += '<div class="result-path">' + escapeHtml(d.module) + ' / ' + escapeHtml(d.file) + '.md</div>';
        if (snippet) html += '<div class="result-snippet">' + highlight(snippet, keywords) + '</div>';
        html += '</div>';
      });
      html += '</div>';
    }
    html += '<div class="result-footer">共 ' + matched.length + ' 个结果 · 用空格分隔多个关键字</div>';

    results.innerHTML = html;
    wrap.classList.add('active');
    activeIdx = -1;

    results.querySelectorAll('.result-item').forEach(el => {
      el.addEventListener('click', () => {
        const path = el.getAttribute('data-path');
        const hashPath = path.replace(/\.md$/, '');
        location.hash = '#/' + hashPath;
        clearSearch();
      });
    });
  }

  function clearSearch() {
    input.value = '';
    results.innerHTML = '';
    wrap.classList.remove('active');
    wrap.classList.remove('has-text');
  }

  let timer;
  input.addEventListener('input', (e) => {
    const v = e.target.value;
    wrap.classList.toggle('has-text', !!v);
    clearTimeout(timer);
    timer = setTimeout(() => search(v), 150);
  });

  input.addEventListener('focus', () => {
    if (input.value) search(input.value);
    if (!loaded && !loading) buildIndex();
  });

  clearBtn.addEventListener('click', () => {
    clearSearch();
    input.focus();
  });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.app-search')) {
      wrap.classList.remove('active');
    }
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === '/' && document.activeElement !== input && !e.ctrlKey && !e.metaKey) {
      e.preventDefault();
      input.focus();
    }
    if (e.key === 'Escape') {
      clearSearch();
      input.blur();
    }
    if (wrap.classList.contains('active')) {
      const items = results.querySelectorAll('.result-item');
      if (!items.length) return;
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        activeIdx = (activeIdx + 1) % items.length;
        items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
        items[activeIdx].scrollIntoView({ block: 'nearest' });
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        activeIdx = (activeIdx - 1 + items.length) % items.length;
        items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
        items[activeIdx].scrollIntoView({ block: 'nearest' });
      } else if (e.key === 'Enter') {
        e.preventDefault();
        if (activeIdx >= 0 && items[activeIdx]) items[activeIdx].click();
        else if (items[0]) items[0].click();
      }
    }
  });
})();
</script>

</body>
</html>
